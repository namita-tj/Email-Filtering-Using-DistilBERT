version: "3.9"

services:
  email-filter:
    build: .
    container_name: email-filter-api
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    volumes:
      - model_data:/app/spam_detection_model
    restart: unless-stopped

volumes:
  model_data: